<!doctype html>
<html lang="ja">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>きょうの しゅくだい</title>
  <link rel="icon" href="img/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="app-shell">
    <main class="main-panel" aria-labelledby="todayTitle">
      <header class="hero">
        <div>
          <p class="eyebrow" id="todayLabel">今日</p>
          <h1 id="todayTitle">きょうの しゅくだい</h1>
        </div>
      </header>

      <section class="progress-box" aria-label="宿題の進み具合">
        <div class="progress-copy">
          <strong id="progressText">0 / 0 完了</strong>
          <span id="progressHint"></span>
        </div>
        <div class="progress-track" aria-hidden="true">
          <div class="progress-fill" id="progressFill"></div>
        </div>

        <div class="homework-list" id="homeworkList"></div>
        <div class="empty-state" id="emptyState" hidden>
          <div class="empty-icon" aria-hidden="true">✓</div>
          <h2>きょうは しゅくだいが ないよ！</h2>
          <p>みぎの せっていから しゅくだいを ついか できるよ。</p>
        </div>
      </section>

      <section class="celebration" id="celebration" aria-live="polite" hidden>
        <div class="celebration-emoji" aria-hidden="true">🎉</div>
        <h2>おめでとう！</h2>
        <p>今日の宿題がぜんぶ終わりました。</p>
      </section>

      <section class="calendar-card" aria-labelledby="calendarTitle">
        <div class="calendar-nav">
          <button class="cal-nav-btn" id="calPrev" type="button" aria-label="前の月">◀</button>
          <h2 id="calendarTitle">今月のきろく</h2>
          <button class="cal-nav-btn" id="calNext" type="button" aria-label="次の月">▶</button>
        </div>
        <div class="calendar-grid" id="calendarGrid"></div>
        <p class="calendar-detail" id="calendarDetail" aria-live="polite"></p>
        <p class="calendar-legend">💮 ぜんぶできた　👍 すこしできた　🍵 おやすみ</p>
      </section>
    </main>

    <aside class="settings-panel" aria-labelledby="settingsTitle">
      <div class="settings-card">
        <h2 id="settingsTitle">せってい</h2>
        <p class="settings-note">おうちのひとと せっていしよう！</p>
        <form id="homeworkForm" class="homework-form">
          <label class="field-label" for="homeworkName">しゅくだいの なまえ</label>
          <input id="homeworkName" name="homeworkName" type="text" placeholder="れい：おんどく、けいさんドリル" maxlength="40" required>

          <fieldset class="mode-group">
            <legend>いつやる？</legend>
            <label class="radio-tile">
              <input type="radio" name="scheduleMode" value="once" checked>
              <span>１かい</span>
            </label>
            <label class="radio-tile">
              <input type="radio" name="scheduleMode" value="daily">
              <span>まいにち</span>
            </label>
            <label class="radio-tile">
              <input type="radio" name="scheduleMode" value="weekly">
              <span>ようび</span>
            </label>
          </fieldset>

          <div class="date-field" id="dateField" hidden>
            <label class="field-label" for="homeworkDate">ひにち</label>
            <input id="homeworkDate" name="homeworkDate" type="date">
          </div>

          <fieldset class="weekday-group" id="weekdayGroup" disabled>
            <legend>ようび</legend>
            <label><input type="checkbox" value="1">月</label>
            <label><input type="checkbox" value="2">火</label>
            <label><input type="checkbox" value="3">水</label>
            <label><input type="checkbox" value="4">木</label>
            <label><input type="checkbox" value="5">金</label>
            <label><input type="checkbox" value="6">土</label>
            <label><input type="checkbox" value="0">日</label>
          </fieldset>

          <p class="form-message" id="formMessage" role="status"></p>
          <button class="add-button" id="submitButton" type="submit">しゅくだいを ついか</button>
          <button class="cancel-button" id="cancelButton" type="button" hidden>やめる</button>
        </form>
      </div>

      <div class="registered-card">
        <h2>とうろくした しゅくだい</h2>
        <div class="registered-list" id="registeredList"></div>
      </div>
    </aside>
  </div>

  <div class="confetti-layer" id="confettiLayer" aria-hidden="true"></div>
  <script src="script.js"></script>
</body>

</html>
